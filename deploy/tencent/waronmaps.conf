# Reverse proxy for waronmaps.com -> local Rust game server
# Certbot will add the HTTPS (port 443) server block automatically.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    access_log /var/log/nginx/waronmaps.access.log;
    error_log  /var/log/nginx/waronmaps.error.log;

    # Game HTTP API and static frontend
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket game stream
    location /ws {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
